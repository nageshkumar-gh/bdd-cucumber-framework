name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Why: nightly signal for long-running dependency drift (browsers, demo app changes) without spamming PR checks.
    - cron: "0 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: mvn test (headless)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -B test -Denv=qa -Dbrowser=chrome -Dheadless=true

      - name: Generate Allure report (HTML)
        if: always()
        run: mvn -B -q io.qameta.allure:allure-maven:2.12.0:report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin

  publish-allure:
    name: Publish Allure report to GitHub Pages (nightly)
    if: github.event_name == 'schedule'
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Allure report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
