name: bdd-tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    env:
      CI: true
      MAVEN_OPTS: -Dheadless=true -Dbrowser=CHROME
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Run Cucumber TestNG suite
        run: mvn -B test

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
