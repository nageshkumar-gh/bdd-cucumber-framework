name: ci

on:
  push:
    branches: [""]
  pull_request:
    branches: [""]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: mvn test (headless)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -B test -Denv=qa -Dbrowser=chrome -Dheadless=true

      - name: Generate Allure report (HTML)
        if: always()
        run: mvn -B -q io.qameta.allure:allure-maven:2.12.0:report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin
