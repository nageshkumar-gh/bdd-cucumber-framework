# Default environment. Can be overridden: -Denv=qa
env=local

# App URLs
app.loginUrl=https://opensource-demo.orangehrmlive.com/web/index.php/auth/login

# Credentials (prefer env vars APP_USERNAME / APP_PASSWORD)
app.username=Admin
app.password=admin123

# Timeouts
timeouts.implicitWaitSeconds=10
timeouts.explicitWaitSeconds=15
timeouts.pageLoadTimeoutSeconds=30

# Browser: CHROME | FIREFOX | EDGE (also supports -Dbrowser=CHROME)
browser=CHROME
# browser.headless=true forces headless locally; CI sets headless via CI=true unless overridden
browser.headless=false

# Optional remote grid (also supports env SELENIUM_GRID_URL)
# selenium.grid.url=http://localhost:4444/wd/hub

