# Default environment configuration (QA).
# We keep this minimal and explicit because ConfigReader will treat these keys as the framework contract.

# OrangeHRM demo base URL (QA environment)
base.url=https://opensource-demo.orangehrmlive.com

# Browser name consumed by DriverFactory (e.g., chrome, firefox)
browser=chrome

# Headless mode default; can be overridden by -Dheadless=true/false later
headless=false

# Default explicit wait timeout (in seconds) used by WaitUtils
wait.timeout=15

