# UAT environment configuration.
# Same keys as config.properties by design, so environment switching is a pure file swap.

# OrangeHRM demo base URL (UAT environment)
base.url=https://opensource-demo.orangehrmlive.com

# Browser name consumed by DriverFactory (e.g., chrome, firefox)
browser=chrome

# Headless mode default for UAT; CI may override with -Dheadless=true
headless=true

# Default explicit wait timeout (in seconds) used by WaitUtils
wait.timeout=20

