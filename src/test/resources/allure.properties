# Allure runtime configuration for local + CI test runs.
#
# Why this file exists:
# - Allure needs a stable, known location to write raw results so `allure serve target/allure-results`
#   works consistently across machines and GitHub Actions artifacts.
# - Keeping it under src/test/resources makes it part of the test classpath (Surefire) without
#   coupling reporting paths to production/main code packaging decisions.

# Where Allure writes raw results during the test run.
allure.results.directory=target/allure-results

# Keep result files readable in CI logs when needed (still small enough for typical UI tests).
allure.attachments.encoding=UTF-8
